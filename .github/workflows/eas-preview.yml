name: EAS Build — Preview (APK Android)

# Déclenché sur chaque push vers une branche feature/* ou develop
# Produit un APK téléchargeable directement (pas besoin du Play Store)
on:
  push:
    branches:
      - "feature/**"
      - develop
  workflow_dispatch:
    inputs:
      platform:
        description: "Plateforme à builder"
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (preview)
        run: |
          PLATFORM=${{ github.event.inputs.platform || 'android' }}
          eas build \
            --profile preview \
            --platform $PLATFORM \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
          EXPO_PUBLIC_GEMINI_MODEL: gemini-2.5-flash
          EXPO_PUBLIC_APP_ENV: preview
