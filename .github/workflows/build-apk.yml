name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties (clés depuis les secrets GitHub)
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Restore google-services.json (depuis le secret GitHub)
        if: ${{ env.HAS_GS != '' }}
        env:
          HAS_GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$HAS_GS" > app/google-services.json

      - name: Build debug APK
        run: |
          chmod +x ./gradlew || gradle wrapper
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youme-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
