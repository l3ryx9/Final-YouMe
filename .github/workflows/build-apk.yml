name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties (clés depuis les secrets GitHub)
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      - name: Restore google-services.json (depuis le secret GitHub)
        if: ${{ env.HAS_GS != '' }}
        env:
          HAS_GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$HAS_GS" > app/google-services.json

      - name: Build debug APK
        run: |
          chmod +x ./gradlew || gradle wrapper
          ./gradlew assembleDebug --stacktrace

      - name: Decode keystore (release)
        if: ${{ env.KS != '' }}
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if echo "$KS" | tr -d ' \t\n\r' | base64 -d > $RUNNER_TEMP/youme-release.keystore 2>/dev/null; then
            echo "KEYSTORE_OK=true" >> $GITHUB_ENV
          else
            echo "::warning::KEYSTORE_BASE64 invalide — l'APK release ne sera pas généré. Recollez le secret depuis youme-keystore-secrets.txt (la longue ligne complète)."
          fi

      - name: Build release APK (signé + obfusqué)
        if: ${{ env.KEYSTORE_OK == 'true' }}
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/youme-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: youme-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        if: ${{ env.KEYSTORE_OK == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: youme-release-apk
          path: app/build/outputs/apk/release/app-release.apk
