name: Build Android APK (sans EAS)

# Compile un APK Android debug directement sur le runner GitHub.
# Aucun compte Expo / token EAS requis : l'APK est déposé en artefact
# téléchargeable dans l'onglet "Actions" du run.
on:
  workflow_dispatch:
  push:
    branches:
      - feature/replit-v6

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-apk:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS objects (modèles IA)
        run: git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Génère le dossier natif android/ depuis la config Expo (app.json, plugins).
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Gradle build (assembleDebug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youme-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error
